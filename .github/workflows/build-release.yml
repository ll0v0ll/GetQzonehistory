name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            target: win
            suffix: '.exe'
          - os: macos-latest
            target: mac
            suffix: ''
          - os: ubuntu-latest
            target: linux
            suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libzbar0

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install zbar

      - name: Download zbar DLL (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          curl -L -o zbar.zip https://github.com/NaturalHistoryMuseum/zbar-windows/releases/download/v0.10/zbar-0.10-win.zip
          7z x zbar.zip -o./zbar
          cp ./zbar/zbar/*.dll .

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --name "GetQzonehistory_${{ matrix.target }}" --add-data "resource;resource" --add-binary "libzbar-64.dll;." main.py

      - name: Build with PyInstaller (Mac/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onefile --name "GetQzonehistory_${{ matrix.target }}" --add-data "resource:resource" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GetQzonehistory_${{ matrix.target }}
          path: dist/GetQzonehistory_${{ matrix.target }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/GetQzonehistory_win/GetQzonehistory_win.exe
            artifacts/GetQzonehistory_mac/GetQzonehistory_mac
            artifacts/GetQzonehistory_linux/GetQzonehistory_linux
          body: |
            ## GetQzonehistory ${{ github.ref_name }}
            
            ### 使用方法
            1. 下载对应系统的可执行文件
            2. Windows用户直接双击运行 `GetQzonehistory_win.exe`
            3. Mac/Linux用户需要先赋予执行权限: `chmod +x GetQzonehistory_mac` 或 `chmod +x GetQzonehistory_linux`
            4. 运行程序后扫码登录QQ即可
            
            ### 更新内容
            请查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
